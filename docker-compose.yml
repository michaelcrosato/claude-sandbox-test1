# Posthorn — production Docker Compose stack
#
# Brings up the Posthorn gateway together with a Prometheus instance that
# scrapes its /metrics endpoint.  Durable state lives in named Docker volumes
# (posthorn-data, prometheus-data) and survives upgrades.
#
# Quick start:
#   1. cp .env.example .env          # set POSTHORN_ADMIN_TOKEN at minimum
#   2. docker compose up -d
#   3. docker compose run --rm posthorn admin create-app "My App"
#   4. docker compose run --rm posthorn admin create-key <appId>
#
# The gateway is reachable at http://localhost:3000.
# Prometheus UI is reachable at http://localhost:9090.
# See docs/DEPLOY.md for the full production guide.

services:
  posthorn:
    build: .
    image: posthorn:local
    ports:
      - "${POSTHORN_PORT:-3000}:3000"
    volumes:
      - posthorn-data:/data
    env_file:
      - .env
    environment:
      POSTHORN_DATA_DIR: /data
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.3.1
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    restart: unless-stopped

volumes:
  posthorn-data:
  prometheus-data:
