name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check · Test · Build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Low end is the engines.node floor (flag-free node:sqlite); high end is current.
        node: ["22.13", "24"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  smoke:
    name: Compiled-dist smokes
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Run on the engines.node floor (flag-free node:sqlite); exercising the
      # compiled end-to-end paths on the minimum supported Node is the signal
      # the unit suite can't give.
      - name: Set up Node 22.13
        uses: actions/setup-node@v4
        with:
          node-version: "22.13"
          cache: npm

      - name: Install
        run: npm ci

      # smoke.sh builds dist, then runs every scripts/smoke-*.mjs except the
      # Postgres one (it needs a live PG service). python3 is preinstalled on
      # ubuntu-latest and drives smoke-python-sdk.mjs (import-only, no pip).
      - name: Build + run compiled-dist smokes
        env:
          PYTHON: python3
        run: bash scripts/agent/smoke.sh

  docker:
    name: Docker image build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from package.json
        id: ver
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build --build-arg POSTHORN_VERSION=${{ steps.ver.outputs.version }} -t posthorn:ci .

      - name: Verify OCI labels
        run: |
          set -euo pipefail
          got_version=$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.version" }}' posthorn:ci)
          got_license=$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.licenses" }}' posthorn:ci)
          echo "version label: $got_version | license label: $got_license"
          test "$got_version" = "${{ steps.ver.outputs.version }}"
          test "$got_license" = "MIT"

  helm:
    name: Helm chart lint + render
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/posthorn

      - name: Render — default (SQLite, single replica)
        run: helm template rel deploy/helm/posthorn

      - name: Render — Postgres with every optional template enabled
        run: |
          helm template rel deploy/helm/posthorn \
            --set backend.type=postgres \
            --set backend.postgres.url=postgres://u:p@db:5432/posthorn \
            --set replicaCount=3 \
            --set admin.enabled=true --set admin.token=0123456789abcdefX \
            --set signup.enabled=true \
            --set billing.provider=stripe \
            --set billing.stripe.secretKey=sk_test_x \
            --set billing.stripe.webhookSecret=whsec_x \
            --set ingress.enabled=true --set ingress.className=nginx \
            --set podDisruptionBudget.enabled=true \
            --set serviceMonitor.enabled=true

      - name: Guard — SQLite is single-writer and must refuse to scale
        run: |
          if helm template rel deploy/helm/posthorn --set replicaCount=2 >/dev/null 2>&1; then
            echo "BUG: chart rendered a multi-replica SQLite deployment"; exit 1
          fi
          if helm template rel deploy/helm/posthorn --set backend.type=postgres >/dev/null 2>&1; then
            echo "BUG: chart rendered a Postgres deployment with no connection string"; exit 1
          fi
          echo "validation guards fire as expected"

  package:
    name: Publish readiness (npm pack)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Assert tarball contents (entrypoints in, tests/maps out)
        run: |
          npm pack --dry-run --json > pack.json
          node -e "const d=JSON.parse(require('fs').readFileSync('pack.json','utf8'));const f=d[0].files.map(x=>x.path);const bad=f.filter(p=>/[.]test[.]|[.]map$/.test(p));if(bad.length){console.error('forbidden files in tarball:',bad);process.exit(1);}for(const need of ['dist/index.js','dist/index.d.ts','dist/main.js']){if(!f.includes(need)){console.error('missing required entrypoint:',need);process.exit(1);}}console.log('pack OK:',d[0].name+'@'+d[0].version,f.length,'files');"

  audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install
        run: npm ci

      # Posthorn ships zero required runtime dependencies (the core is Node
      # built-ins; pg is optional), so the production tree should audit clean.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high
