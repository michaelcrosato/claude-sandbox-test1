name: Publish to npm

# Publishes the package to npm using **trusted publishing** (OIDC) — there is NO npm
# token stored in this repository. Authentication is exchanged at run time via the
# GitHub OIDC id-token, and provenance attestations (Sigstore) are generated
# automatically, linking the published tarball to this workflow + commit.
#
# DORMANT until activated. It only triggers on a published GitHub Release (or a
# manual dispatch), AND it only succeeds once a Trusted Publisher for this repo +
# workflow is configured on npmjs.com. Until then it never runs / fails safely at
# the publish step — it can ship nothing on its own.
#
# Activation (human, one-time, on npmjs.com — NOT doable from this repo or by an agent):
#   1. Own/claim the "posthorn" package name on npm.
#   2. Package settings → Trusted Publisher → add: this repository, workflow
#      ".github/workflows/publish.yml".
#   3. Publish a GitHub Release (e.g. tag v1.0.0). This workflow then builds, tests,
#      and publishes WITH provenance, no token required.
#
# NOTE (2026 supply-chain): provenance proves WHICH workflow built the tarball, not
# that its inputs were clean — review the diff + lockfile before tagging a release.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm trusted publishing + provenance (OIDC)

jobs:
  publish:
    name: Build · Test · Publish (provenance)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm

      # Trusted publishing + automatic provenance require a recent npm.
      - name: Ensure a trusted-publishing-capable npm
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      # No NODE_AUTH_TOKEN here: auth is via OIDC (trusted publishing), and npm
      # emits provenance automatically when run from a trusted CI workflow.
      - name: Publish to npm (provenance via OIDC)
        run: npm publish --access public
