# Prometheus alerting rules for Posthorn.
#
# Load these rules by adding the file to `rule_files` in prometheus.yml (already
# done in the shipped monitoring/prometheus.yml).  Wire them to your Alertmanager
# or a hosted alerting service (Grafana OnCall, PagerDuty, etc.).

groups:
  - name: posthorn.availability
    rules:
      - alert: PosthornDown
        expr: up{job="posthorn"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Posthorn gateway is unreachable"
          description: >
            The Posthorn scrape target {{ $labels.instance }} has been down for
            more than 1 minute.  The gateway may have crashed or lost network
            connectivity.

  - name: posthorn.delivery
    rules:
      - alert: PosthornDeadLetterBacklog
        expr: posthorn_delivery_tasks{status="dead_letter"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $value }} dead-lettered deliveries need attention"
          description: >
            {{ $value }} deliveries have exhausted their automatic retry schedule
            and are sitting in the dead-letter state.  Fix the failing receivers
            and then replay the messages via POST /v1/messages/:id/retry or the
            tenant dashboard.

      - alert: PosthornDeadLetterBacklogHigh
        expr: posthorn_delivery_tasks{status="dead_letter"} > 100
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Large dead-letter backlog: {{ $value }} deliveries"
          description: >
            More than 100 deliveries are dead-lettered.  This may indicate a
            systemic receiver outage.  Investigate and replay once receivers
            are healthy.

      - alert: PosthornDeliveryFailureRateHigh
        # More than 20% of delivery outcomes in the last 10 minutes are failures.
        expr: >
          rate(posthorn_deliveries_total{outcome="failed"}[10m])
          /
          (rate(posthorn_deliveries_total[10m]) + 1e-9)
          > 0.2
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Delivery failure rate above 20%"
          description: >
            More than 20% of delivery attempts in the last 10 minutes have
            failed.  This may indicate receivers are returning non-2xx responses
            or timing out.  Check the per-attempt audit log for affected messages.

      - alert: PosthornDeliveryQueueDepthHigh
        expr: posthorn_delivery_tasks{status="pending"} > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Delivery backlog: {{ $value }} pending tasks"
          description: >
            More than 1 000 deliveries are queued as pending.  The worker may
            be falling behind or a burst of messages arrived.  Consider
            increasing POSTHORN_WORKER_BATCH_SIZE or POSTHORN_WORKER_CONCURRENCY.

  - name: posthorn.database
    rules:
      - alert: PosthornPostgresPoolErrors
        # posthorn_pg_pool_errors_total is per-replica (it accumulates in the process
        # whose pooled connection was severed), so alert per-instance — do NOT aggregate.
        # Only fires when POSTHORN_DATABASE_URL is set; on the SQLite backend the counter
        # is always 0 and this rule never triggers.
        expr: rate(posthorn_pg_pool_errors_total[5m]) > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Postgres connection pool reporting errors on {{ $labels.instance }}"
          description: >
            The Postgres connection pool on {{ $labels.instance }} emitted recoverable
            'error' events over the last 5 minutes — a severed idle connection from a
            database restart/failover, idle timeout, or network blip.  The pool
            reconnects automatically (no request failed, and /readyz tracks live
            reachability), but a sustained rate means the database is flapping and
            deliveries may stall.  Check the managed-Postgres status and the gateway
            logs ("postgres pool error").
