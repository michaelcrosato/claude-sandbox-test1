# Prometheus scrape configuration for Posthorn.
#
# /metrics is unauthenticated and exposes only instance-aggregate operational
# data (no tenant ids, payloads, or secrets), so it is safe to scrape from the
# internal network without a Bearer token.  If you want to restrict scraping,
# place Posthorn behind a reverse proxy and block /metrics at the proxy layer.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  - job_name: posthorn
    static_configs:
      - targets: ["posthorn:3000"]
    metrics_path: /metrics
