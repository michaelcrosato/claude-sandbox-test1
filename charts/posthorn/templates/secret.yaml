{{- if and .Values.admin.createSecret (not .Values.admin.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "posthorn.adminSecretName" . }}
  labels:
    {{- include "posthorn.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.admin.existingSecretKey }}: {{ required "admin.token is required when admin.createSecret is true and admin.existingSecret is empty" .Values.admin.token | quote }}
{{- end }}
