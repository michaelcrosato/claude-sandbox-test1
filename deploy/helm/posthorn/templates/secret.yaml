{{- if eq (include "posthorn.createsSecret" .) "true" }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "posthorn.secretName" . }}
  labels:
    {{- include "posthorn.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.admin.enabled (not .Values.admin.existingSecret) .Values.admin.token }}
  adminToken: {{ .Values.admin.token | quote }}
  {{- end }}
  {{- if and (eq .Values.backend.type "postgres") (not .Values.backend.postgres.existingSecret) .Values.backend.postgres.url }}
  databaseUrl: {{ .Values.backend.postgres.url | quote }}
  {{- end }}
  {{- if and (eq .Values.billing.provider "stripe") (not .Values.billing.stripe.existingSecret) }}
  {{- if .Values.billing.stripe.secretKey }}
  stripeSecretKey: {{ .Values.billing.stripe.secretKey | quote }}
  {{- end }}
  {{- if .Values.billing.stripe.webhookSecret }}
  stripeWebhookSecret: {{ .Values.billing.stripe.webhookSecret | quote }}
  {{- end }}
  {{- end }}
{{- end }}
