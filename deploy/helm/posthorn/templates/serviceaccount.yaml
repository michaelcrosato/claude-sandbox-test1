{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "posthorn.serviceAccountName" . }}
  labels:
    {{- include "posthorn.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Posthorn needs no Kubernetes API access — don't auto-mount the token.
automountServiceAccountToken: false
{{- end }}
