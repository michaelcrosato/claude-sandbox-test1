apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "posthorn.fullname" . }}
  labels:
    {{- include "posthorn.labels" . | nindent 4 }}
data:
  POSTHORN_HOST: {{ .Values.config.host | quote }}
  POSTHORN_PORT: {{ .Values.config.port | quote }}
  POSTHORN_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
  POSTHORN_MAX_BODY_BYTES: {{ .Values.config.maxBodyBytes | quote }}
  POSTHORN_PUBLIC_BASE_URL: {{ .Values.config.publicBaseUrl | quote }}
  POSTHORN_ALLOW_PRIVATE_NETWORK_WEBHOOKS: {{ .Values.config.allowPrivateNetworkWebhooks | quote }}
  POSTHORN_RETENTION_DAYS: {{ .Values.config.retentionDays | quote }}
  POSTHORN_DEFAULT_RATE_LIMIT: {{ .Values.config.defaultRateLimit | quote }}
  POSTHORN_ENDPOINT_AUTO_DISABLE_AFTER_MS: {{ .Values.config.endpointAutoDisableAfterMs | quote }}
  {{- if eq .Values.backend.type "sqlite" }}
  POSTHORN_DATA_DIR: "/data"
  {{- else }}
  POSTHORN_PG_POOL_MAX: {{ .Values.backend.postgres.poolMax | quote }}
  {{- end }}
  # HTTP socket lifetimes
  POSTHORN_HTTP_KEEP_ALIVE_TIMEOUT_MS: {{ .Values.config.http.keepAliveTimeoutMs | quote }}
  POSTHORN_HTTP_HEADERS_TIMEOUT_MS: {{ .Values.config.http.headersTimeoutMs | quote }}
  POSTHORN_HTTP_REQUEST_TIMEOUT_MS: {{ .Values.config.http.requestTimeoutMs | quote }}
  POSTHORN_HTTP_SHUTDOWN_GRACE_MS: {{ .Values.config.http.shutdownGraceMs | quote }}
  # Delivery worker
  POSTHORN_WORKER_BATCH_SIZE: {{ .Values.config.worker.batchSize | quote }}
  POSTHORN_WORKER_CONCURRENCY: {{ .Values.config.worker.concurrency | quote }}
  POSTHORN_WORKER_REQUEST_TIMEOUT_MS: {{ .Values.config.worker.requestTimeoutMs | quote }}
  POSTHORN_WORKER_CONNECT_TIMEOUT_MS: {{ .Values.config.worker.connectTimeoutMs | quote }}
  POSTHORN_WORKER_IDLE_POLL_MS: {{ .Values.config.worker.idlePollMs | quote }}
  POSTHORN_WORKER_VISIBILITY_TIMEOUT_MS: {{ .Values.config.worker.visibilityTimeoutMs | quote }}
  # Transactional outbox / fan-out
  POSTHORN_FANOUT_GRACE_MS: {{ .Values.config.fanout.graceMs | quote }}
  POSTHORN_FANOUT_BATCH_SIZE: {{ .Values.config.fanout.batchSize | quote }}
  POSTHORN_FANOUT_IDLE_POLL_MS: {{ .Values.config.fanout.idlePollMs | quote }}
  # HSTS
  POSTHORN_HSTS_MAX_AGE: {{ .Values.config.hsts.maxAge | quote }}
  POSTHORN_HSTS_INCLUDE_SUBDOMAINS: {{ .Values.config.hsts.includeSubDomains | quote }}
  POSTHORN_HSTS_PRELOAD: {{ .Values.config.hsts.preload | quote }}
  # Self-serve signup
  POSTHORN_SIGNUP_ENABLED: {{ .Values.signup.enabled | quote }}
  POSTHORN_SIGNUP_RATE_LIMIT_PER_MINUTE: {{ .Values.signup.ratePerMinute | quote }}
  # Billing
  POSTHORN_BILLING_PROVIDER: {{ .Values.billing.provider | quote }}
  {{- if eq .Values.billing.provider "stripe" }}
  POSTHORN_STRIPE_METER_EVENT_NAME: {{ .Values.billing.stripe.meterEventName | quote }}
  {{- end }}
