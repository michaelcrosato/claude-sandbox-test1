{{- include "posthorn.validateConfig" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "posthorn.fullname" . }}
  labels:
    {{- include "posthorn.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "posthorn.selectorLabels" . | nindent 6 }}
  {{- if eq .Values.backend.type "sqlite" }}
  # SQLite is single-writer: recreate the one pod (releasing its RWO volume)
  # rather than rolling, which would deadlock on the volume during the overlap.
  strategy:
    type: Recreate
  {{- end }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if eq (include "posthorn.createsSecret" .) "true" }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "posthorn.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "posthorn.serviceAccountName" . }}
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ include "posthorn.terminationGracePeriodSeconds" . }}
      containers:
        - name: posthorn
          image: {{ include "posthorn.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.config.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "posthorn.fullname" . }}
          env:
            {{- if .Values.admin.enabled }}
            - name: POSTHORN_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.admin.existingSecret | default (include "posthorn.secretName" .) }}
                  key: {{ .Values.admin.existingSecretKey }}
            {{- end }}
            {{- if eq .Values.backend.type "postgres" }}
            - name: POSTHORN_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.postgres.existingSecret | default (include "posthorn.secretName" .) }}
                  key: {{ .Values.backend.postgres.existingSecretKey }}
            {{- end }}
            {{- if eq .Values.billing.provider "stripe" }}
            - name: POSTHORN_STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.existingSecret | default (include "posthorn.secretName" .) }}
                  key: {{ .Values.billing.stripe.existingSecretKeys.secretKey }}
            {{- if or .Values.billing.stripe.existingSecret .Values.billing.stripe.webhookSecret }}
            - name: POSTHORN_STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.billing.stripe.existingSecret | default (include "posthorn.secretName" .) }}
                  key: {{ .Values.billing.stripe.existingSecretKeys.webhookSecret }}
                  optional: true
            {{- end }}
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if .Values.startupProbe.enabled }}
          startupProbe:
            {{- omit .Values.startupProbe "enabled" | toYaml | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if and (eq .Values.backend.type "sqlite") .Values.persistence.enabled }}
            - name: data
              mountPath: /data
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if and (eq .Values.backend.type "sqlite") .Values.persistence.enabled }}
        - name: data
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.existingClaim | default (printf "%s-data" (include "posthorn.fullname" .)) }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
