apiVersion: v1
kind: Pod
metadata:
  name: {{ include "posthorn.fullname" . }}-test-connection
  labels:
    {{- include "posthorn.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: probe
      image: busybox:1.36
      securityContext:
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      # /readyz returns 200 only once the storage backend is reachable — a
      # stronger end-to-end signal than /healthz for a release test.
      command:
        - wget
        - -q
        - -O-
        - http://{{ include "posthorn.fullname" . }}:{{ .Values.service.port }}/readyz
