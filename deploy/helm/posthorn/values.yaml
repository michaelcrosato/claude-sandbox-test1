# Default values for Posthorn.
# This is a YAML-formatted file. Every key is documented; the defaults boot a
# working single-replica SQLite deployment with the admin API, billing, and
# signup all OFF (the open-core default posture).

# -- Container image. tag defaults to the chart's appVersion when left empty.
image:
  repository: posthorn
  tag: ""
  pullPolicy: IfNotPresent

# -- Secrets for pulling image.repository from a private registry.
imagePullSecrets: []

# -- Override the chart name / the fully-qualified release name.
nameOverride: ""
fullnameOverride: ""

# -- Number of gateway replicas. Honored ONLY when autoscaling.enabled is false.
# IMPORTANT: the embedded SQLite backend is single-writer — keep this at 1 (one
# pod, one ReadWriteOnce volume). Scale out (>1) only on backend.type=postgres.
replicaCount: 1

# ---------------------------------------------------------------------------
# Storage backend
# ---------------------------------------------------------------------------
backend:
  # -- "sqlite" (default, embedded, single-writer, needs a PVC) or "postgres"
  # (shared database, horizontally-scalable active/active replicas, no PVC).
  type: sqlite

  postgres:
    # -- Postgres connection string (postgres:// or postgresql://). Used only
    # when type=postgres. Prefer existingSecret over inlining a password here;
    # an inline value is written into a chart-managed Secret.
    url: ""
    # -- Reference an existing Secret holding the connection string instead of
    # letting the chart create one. Leave empty to use the inline url above.
    existingSecret: ""
    existingSecretKey: databaseUrl
    # -- Max connections EACH replica opens against the shared database. Keep
    # (replicaCount × this) under the server's max_connections.
    poolMax: 10

# -- Persistent volume for the SQLite data dir (/data). Used only when
# backend.type=sqlite. On postgres no volume is mounted (replicas are stateless).
persistence:
  enabled: true
  # -- Bind an existing PVC instead of creating one (e.g. to restore a backup).
  existingClaim: ""
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 8Gi
  annotations: {}

# ---------------------------------------------------------------------------
# Operator control-plane (admin API + dashboard) — opt-in, like the app default.
# ---------------------------------------------------------------------------
admin:
  # -- Enable the /v1/admin/* API and dashboard by wiring POSTHORN_ADMIN_TOKEN.
  # When false the admin surface stays 404 (hidden), the secure default.
  enabled: false
  # -- Admin bearer token (min 16 chars). Written into a chart-managed Secret.
  # Ignored when existingSecret is set.
  token: ""
  # -- Use an existing Secret for the admin token instead of the inline value.
  existingSecret: ""
  existingSecretKey: adminToken

# ---------------------------------------------------------------------------
# Self-serve signup (POST /v1/signup) — opt-in.
# ---------------------------------------------------------------------------
signup:
  # -- Expose the public signup route (creates a free-plan tenant + first key).
  # false keeps it 404, indistinguishable from a nonexistent path.
  enabled: false
  # -- Gateway-wide signups accepted per rolling minute (1..10000).
  ratePerMinute: 10

# ---------------------------------------------------------------------------
# Non-secret runtime config (maps to POSTHORN_* env). See docs/DEPLOY.md.
# ---------------------------------------------------------------------------
config:
  # -- Port the gateway listens on inside the pod (POSTHORN_PORT).
  port: 3000
  # -- Bind address (POSTHORN_HOST). 0.0.0.0 so the Service can reach it.
  host: "0.0.0.0"
  # -- Canonical public base URL for portal links (POSTHORN_PUBLIC_BASE_URL).
  # Leave empty to derive from each request's Host + X-Forwarded-Proto.
  publicBaseUrl: ""
  # -- Log verbosity: debug | info | warn | error | silent (POSTHORN_LOG_LEVEL).
  logLevel: info
  # -- Max request body in bytes; larger is 413 (POSTHORN_MAX_BODY_BYTES).
  maxBodyBytes: 1000000
  # -- Allow webhook URLs that target private/internal addresses. Leave false in
  # any multi-tenant deployment (POSTHORN_ALLOW_PRIVATE_NETWORK_WEBHOOKS).
  allowPrivateNetworkWebhooks: false
  # -- Delete delivered/expired data older than N days on an hourly sweep; 0
  # disables pruning (POSTHORN_RETENTION_DAYS).
  retentionDays: 0
  # -- Gateway-wide default delivery rate limit (deliveries/min) for endpoints
  # with no explicit limit. Empty = unrestricted (POSTHORN_DEFAULT_RATE_LIMIT).
  defaultRateLimit: ""
  # -- How long (ms) an endpoint must fail continuously before auto-disable; 0
  # disables the feature (POSTHORN_ENDPOINT_AUTO_DISABLE_AFTER_MS). Default 5d.
  endpointAutoDisableAfterMs: 432000000

  http:
    # -- Keep-alive timeout (ms). Raise ABOVE your LB's idle timeout to dodge
    # the upstream-502 reuse race (POSTHORN_HTTP_KEEP_ALIVE_TIMEOUT_MS).
    keepAliveTimeoutMs: 5000
    # -- Headers timeout; must be <= requestTimeoutMs when both non-zero.
    headersTimeoutMs: 60000
    # -- Whole-request timeout (ms) (POSTHORN_HTTP_REQUEST_TIMEOUT_MS).
    requestTimeoutMs: 300000
    # -- Graceful-shutdown drain window (ms). terminationGracePeriodSeconds is
    # derived from this when left unset (POSTHORN_HTTP_SHUTDOWN_GRACE_MS).
    shutdownGraceMs: 10000

  worker:
    batchSize: 16
    concurrency: 8
    # -- Total per-attempt timeout: DNS + connect + receiver response (ms).
    requestTimeoutMs: 10000
    # -- Connect-only deadline (DNS + TCP) so an unreachable endpoint fails fast.
    connectTimeoutMs: 5000
    idlePollMs: 1000
    visibilityTimeoutMs: 30000

  fanout:
    graceMs: 5000
    batchSize: 50
    idlePollMs: 5000

  # -- HTTP Strict Transport Security. Only safe once this origin is genuinely
  # reached over HTTPS. maxAge 0 disables the header.
  hsts:
    maxAge: 0
    includeSubDomains: false
    preload: false

# ---------------------------------------------------------------------------
# Billing (optional) — none (default) or stripe.
# ---------------------------------------------------------------------------
billing:
  provider: none
  stripe:
    # -- Stripe secret key (sk_…). Required when provider=stripe.
    secretKey: ""
    # -- Stripe webhook signing secret (whsec_…). Optional; when unset the
    # inbound POST /v1/billing/webhook route stays 404.
    webhookSecret: ""
    # -- Stripe meter event_name a usage push is recorded under.
    meterEventName: posthorn_messages
    # -- Use an existing Secret for the Stripe credentials instead of inline.
    existingSecret: ""
    existingSecretKeys:
      secretKey: stripeSecretKey
      webhookSecret: stripeWebhookSecret

# -- Escape hatch: extra raw env vars appended verbatim to the container.
# Each item is a standard core/v1 EnvVar (name + value or valueFrom).
extraEnv: []

# ---------------------------------------------------------------------------
# Service / networking
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 80
  # -- Optional explicit nodePort when type=NodePort.
  nodePort: ""
  annotations: {}

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: posthorn.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

# ---------------------------------------------------------------------------
# Scheduling / scaling
# ---------------------------------------------------------------------------
resources: {}
  # limits:
  #   cpu: 500m
  #   memory: 256Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# -- Horizontal Pod Autoscaler. Requires backend.type=postgres (SQLite is
# single-writer and cannot scale). Disables the static replicaCount.
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: ""

# -- PodDisruptionBudget — keep capacity during voluntary disruptions.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  maxUnavailable: ""

# -- Prometheus Operator ServiceMonitor scraping /metrics. Requires the
# Prometheus Operator CRDs to be installed in the cluster.
serviceMonitor:
  enabled: false
  interval: 30s
  scrapeTimeout: ""
  path: /metrics
  labels: {}
  relabelings: []
  metricRelabelings: []

# -- Pod termination grace. Empty = derive (shutdownGraceMs/1000 + 5s headroom),
# satisfying the rule terminationGracePeriodSeconds >= shutdownGraceMs/1000.
# Set explicitly if shutdownGraceMs is 0 (drain bounded by requestTimeoutMs).
terminationGracePeriodSeconds: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}

# -- Pod-level security context. The image runs as the unprivileged node user
# (uid/gid 1000); fsGroup lets it write the mounted /data volume.
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context. readOnlyRootFilesystem is safe because
# all writes go to the mounted /data volume (SQLite) and an emptyDir /tmp.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- Liveness probe → GET /healthz (process up; never touches the backend, so a
# backend blip does not restart a healthy pod).
livenessProbe:
  httpGet:
    path: /healthz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 15
  timeoutSeconds: 3
  failureThreshold: 3

# -- Readiness probe → GET /readyz (probes the backend; a pod whose Postgres is
# unreachable is pulled from rotation while staying alive to recover).
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 3
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 3

# -- Startup probe (optional). Disabled by default; useful on slow cold starts.
startupProbe:
  enabled: false
  httpGet:
    path: /healthz
    port: http
  periodSeconds: 5
  failureThreshold: 30

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
