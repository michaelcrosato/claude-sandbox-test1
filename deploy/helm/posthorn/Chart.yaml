apiVersion: v2
name: posthorn
description: >-
  Posthorn — Standard Webhooks-compliant reliable outbound webhook delivery.
  Single container, embedded SQLite by default (no Redis), with an optional
  shared-Postgres backend for horizontally-scalable active/active replicas.
type: application

# Chart version — bump on every chart change (SemVer). Independent of the app.
version: 0.1.0

# The Posthorn release this chart's default image tag points at.
appVersion: "1.0.0"

kubeVersion: ">=1.23.0-0"

home: https://github.com/michaelcrosato/claude-sandbox-test1
sources:
  - https://github.com/michaelcrosato/claude-sandbox-test1
maintainers:
  - name: Michael Crosato
keywords:
  - webhooks
  - webhook-delivery
  - standard-webhooks
  - outbound
  - gateway
icon: https://raw.githubusercontent.com/michaelcrosato/claude-sandbox-test1/main/docs/logo.png
annotations:
  category: Integration
  licenses: MIT
